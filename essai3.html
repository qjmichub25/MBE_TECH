<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essai 3 : Statuts & Sacrements</title>
    
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_semanticui.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    
    <style>
        :root {
            --primary-color: #6366f1;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 24px;
            background-color: var(--bg-color);
            color: var(--text-main);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 24px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 16px;
        }
        h1 {
            font-size: 22px;
            color: #4f46e5;
            margin: 0 0 8px 0;
        }
        .subtitle {
            color: #64748b;
            margin: 0;
            font-size: 14px;
        }
        /* Style des Onglets Airtable */
        .nav-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: #e2e8f0;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: #475569;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2);
        }
        .tab-content {
            display: none;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .tab-content.active {
            display: block;
        }
        /* Badge pour la colonne relationnelle 'Qui' */
        .badge-qui {
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            display: inline-block;
            margin: 2px;
            border: 1px solid #bae6fd;
        }
        .tabulator-header-filter input {
            padding: 6px !important;
            border-radius: 6px !important;
            border: 1px solid #cbd5e1 !important;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🛠️ Essai 3 : Statuts & Sacrements</h1>
        <p class="subtitle">Indexation et filtrage dynamique des tables liées de la base de données.</p>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('tab-status')">🏷️ Table : Statu</button>
        <button class="tab-btn" onclick="switchTab('tab-sacrements')">⛪ Table : Sacrements</button>
    </div>

    <div id="tab-status" class="tab-content active">
        <div id="table-status"></div>
    </div>

    <div id="tab-sacrements" class="tab-content">
        <div id="table-sacrements"></div>
    </div>
</div>

<script>
    // 1. Jeu de données calqué sur tes captures d'écran Airtable
    // (Dans un second temps, tu pourras alimenter ces constantes par un fetch() d'API ou de JSON locaux)
    const dataStatus = [
        { id: 1, name: "Prêtre", qui: ["Laurent Bretillot"] },
        { id: 2, name: "Vicaire", qui: [] },
        { id: 3, name: "Catéchumène G26", qui: [] },
        { id: 4, name: "Catéchumène G27", qui: ["Evelyne"] },
        { id: 5, name: "Accompagnant G26", qui: [] },
        { id: 6, name: "Accompagnant G27", qui: ["Christian Dollé", "Jean-Michel Quenillet"] },
        { id: 7, name: "Parrain / Marraine", qui: [] },
        { id: 8, name: "Futur marié", qui: [] }
    ];

    const dataSacrements = [
        { id: 1, name: "Baptême", qui: ["Jean-Michel Quenillet"] },
        { id: 2, name: "1ere Communion", qui: ["Jean-Michel Quenillet"] },
        { id: 3, name: "Confirmation", qui: ["Jean-Michel Quenillet"] },
        { id: 4, name: "Mariage", qui: ["Jean-Michel Quenillet"] }
    ];

    // 2. Formateur visuel pour transformer les tableaux de chaînes (liens Airtable) en badges d'utilisateurs
    function quiBadgeFormatter(cell) {
        const listeQui = cell.getValue();
        if (!listeQui || listeQui.length === 0) return "<span style='color: #cbd5e1; font-style: italic;'>aucun</span>";
        return listeQui.map(nom => `<span class="badge-qui">👤 ${nom}</span>`).join("");
    }

    // 3. Fonction de filtrage personnalisée pour chercher à l'intérieur d'un tableau/relation (colonne 'Qui')
    function filterInsideArray(headerValue, rowValue) {
        if (!rowValue || rowValue.length === 0) return false;
        // Vérifie si au moins un des noms dans le tableau contient la chaîne recherchée
        return rowValue.some(nom => nom.toLowerCase().includes(headerValue.toLowerCase()));
    }

    // 4. Initialisation du Tableau de la table STATUS
    const tableStatus = new Tabulator("#table-status", {
        data: dataStatus,
        layout: "fitColumns",
        placeholder: "Aucune correspondance trouvée",
        columns: [
            { title: "Ligne", field: "id", width: 80, headerSort: true, hozAlign: "center" },
            { title: "🏷️ Name", field: "name", width: 280, headerFilter: "input", headerSort: true },
            { title: "🔗 Qui", field: "qui", headerFilter: "input", formatter: quiBadgeFormatter, headerSort: false,
                headerFilterFunc: filterInsideArray
            }
        ]
    });

    // 5. Initialisation du Tableau de la table SACREMENTS
    const tableSacrements = new Tabulator("#table-sacrements", {
        data: dataSacrements,
        layout: "fitColumns",
        placeholder: "Aucune correspondance trouvée",
        columns: [
            { title: "Ligne", field: "id", width: 80, headerSort: true, hozAlign: "center" },
            { title: "⛪ Name", field: "name", width: 280, headerFilter: "input", headerSort: true },
            { title: "🔗 Qui", field: "qui", headerFilter: "input", formatter: quiBadgeFormatter, headerSort: false,
                headerFilterFunc: filterInsideArray
            }
        ]
    });

    // 6. Logique de permutation des onglets
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        
        // Redraw indispensable pour recalculer l'affichage des grilles masquées lors du clic
        if (tabId === 'tab-status') tableStatus.redraw();
        if (tabId === 'tab-sacrements') tableSacrements.redraw();
    }
</script>

</body>
</html>
