<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essai 2 : Todo Dashboard</title>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #f4f7f9; 
            margin: 0; 
            padding: 15px; 
        }
        .header { 
            background: #10b981; 
            color: white; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .header h2 { margin: 0; font-size: 20px; }
        
        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
        }

        .task-card { 
            background: white; 
            border-radius: 12px; 
            padding: 16px; 
            margin-bottom: 15px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); 
            border-left: 8px solid #cbd5e1; 
            position: relative;
        }
        
        /* Changement de couleur dynamique du bord gauche */
        .status-Todo { border-left-color: #ffa1a1; }
        .status-In-progress { border-left-color: #ffe082; }
        .status-Done { border-left-color: #a7f3d0; }

        .task-date { font-size: 12px; color: #64748b; font-weight: 600; }
        .task-notes { font-size: 15px; color: #1e293b; margin: 10px 0; line-height: 1.4; }
        .task-assignee { 
            display: inline-block;
            background: #f1f5f9;
            color: #475569; 
            font-size: 13px; 
            padding: 4px 8px;
            border-radius: 6px;
            margin-bottom: 12px;
        }
        
        select { 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #cbd5e1; 
            width: 100%; 
            font-size: 14px; 
            background-color: #fff;
            color: #1e293b;
            font-weight: 500;
            cursor: pointer;
        }
        
        #loading { text-align: center; color: #64748b; font-style: italic; margin-top: 30px; }
        .refresh-btn { background: white; color: #10b981; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">⬅ Menu</a>
        <h2>Suivi des Tâches</h2>
        <button class="refresh-btn" onclick="fetchRecords()">🔄</button>
    </div>

    <div id="loading">Connexion à Airtable...</div>
    <div id="task-list"></div>

    <script>
        // ==========================================
        // CONFIGURATION (À REMPLIR)
        // ==========================================
        const AIRTABLE_TOKEN = "patRO0al6CCnnkm0Z.17723e14a60c7e8c570ec7ed15c42ba1ebb3dcd873fe5555bd99d8b95cf3cb6f"; // Mettez votre jeton de sécurité Airtable ici
        const BASE_ID = "appy0zsVyKZTAysme/tblqAzMw07KHwmjty/viwTlMsmy3ZjZIfdQ";             // Mettez l'ID de votre Base Airtable ici
        const TABLE_NAME = "Todo";                  // Le nom exact de votre table
        // ==========================================

        // 1. Récupérer les lignes depuis Airtable
        async function fetchRecords() {
            const listDiv = document.getElementById('task-list');
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            listDiv.innerHTML = '';

            try {
                // On trie par date ("Quand") pour avoir les plus récentes en haut
                const url = `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}?sort[0][field]=Quand&sort[0][direction]=desc`;
                const response = await fetch(url, {
                    headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` }
                });
                
                if (!response.ok) throw new Error("Impossible de lire Airtable. Vérifiez vos IDs/Token.");
                
                const data = await response.json();
                loading.style.display = 'none';
                
                // On affiche chaque ligne trouvée
                data.records.forEach(record => renderTask(record));
            } catch (error) {
                loading.innerText = "❌ Erreur : " + error.message;
            }
        }

        // 2. Créer le visuel d'une tâche
        function renderTask(record) {
            const listDiv = document.getElementById('task-list');
            const fields = record.fields;
            
            // On gère la couleur de la carte selon le statut
            const currentStatus = fields.Status || "Todo";
            const statusClass = "status-" + currentStatus.replace(/\s+/g, '-');

            // On gère le nom de la personne assignée
            let assigneeName = "Non assigné";
            if (fields.Assignee) {
                assigneeName = fields.Assignee.name || fields.Assignee;
            }

            const card = document.createElement('div');
            card.className = `task-card ${statusClass}`;
            
            card.innerHTML = `
                <div class="task-date">📅 ${fields.Quand || 'Pas de date'}</div>
                <div class="task-notes">${fields.Notes || '(Note vide)'}</div>
                <div class="task-assignee">👤 ${assigneeName}</div>
                
                <!-- Menu déroulant local identique à Airtable -->
                <select onchange="updateStatus('${record.id}', this.value)">
                    <option value="Todo" ${currentStatus === 'Todo' ? 'selected' : ''}>🔴 Todo</option>
                    <option value="In progress" ${currentStatus === 'In progress' ? 'selected' : ''}>🟡 In progress</option>
                    <option value="Done" ${currentStatus === 'Done' ? 'selected' : ''}>🟢 Done</option>
                </select>
            `;
            listDiv.appendChild(card);
        }

        // 3. Envoyer la modification à Airtable en temps réel
        async function updateStatus(recordId, newStatus) {
            try {
                const response = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}`, {
                    method: 'PATCH',
                    headers: {
                        Authorization: `Bearer ${AIRTABLE_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        records: [
                            {
                                id: recordId,
                                fields: { "Status": newStatus }
                            }
                        ]
                    })
                });

                if (response.ok) {
                    // On recharge les cartes pour appliquer la nouvelle couleur de bord
                    fetchRecords(); 
                } else {
                    alert("Airtable a refusé la modification. Vérifiez les permissions de votre Token.");
                }
            } catch (error) {
                alert("Erreur réseau : " + error);
            }
        }

        // Démarrage automatique au chargement de la page
        fetchRecords();
    </script>
</body>
</html>
