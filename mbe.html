<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner & Photo MBE Scan</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f4f7f9; margin: 0; padding: 15px; text-align: center; }
        .header { background: #0284c7; color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header h2 { margin: 0; font-size: 20px; }
        .token-bar { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .token-row { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; width: 100%; }
        .token-input { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; width: 100%; max-width: 250px; font-family: monospace; }
        .token-btn { background: #4f46e5; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        #camera-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; border-radius: 12px; overflow: hidden; background: #000; }
        #reader { width: 100%; }
        .scan-laser { position: absolute; top: 50%; left: 5%; width: 90%; height: 2px; background: red; box-shadow: 0 0 8px red; animation: laserMove 2s infinite ease-in-out; z-index: 10; pointer-events: none; }
        @keyframes laserMove { 0% { top: 20%; } 50% { top: 80%; } 100% { top: 20%; } }
        .box { background: white; margin-top: 15px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; }
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-top: 10px; }
        .status-waiting { background: #e2e8f0; color: #64748b; }
        .status-success { background: #dcfce7; color: #16a34a; }
        .status-error { background: #fee2e2; color: #dc2626; }
        
        .photo-btn { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 10px; display: inline-flex; align-items: center; gap: 8px; }
        #photo-preview { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" style="color:white; text-decoration:none; font-weight:bold;">⬅ Menu</a>
        <h2>Scanner & Photo MBE</h2>
        <div style="width: 42px;"></div>
    </div>

    <!-- ZONE DE CONNEXION DOUBLE -->
    <div class="token-bar">
        <div class="token-row">
            <span style="font-weight:bold; width: 110px; text-align: right;">🔑 Airtable PAT :</span>
            <input type="password" id="pat-input" class="token-input" placeholder="patxxxxxxxxxxxxxxxxx">
        </div>
        <div class="token-row">
            <span style="font-weight:bold; width: 110px; text-align: right;">📷 Clé ImgBB :</span>
            <input type="password" id="imgbb-input" class="token-input" placeholder="Clé API ImgBB">
        </div>
        <button onclick="saveTokens()" class="token-btn">Enregistrer les connexions</button>
    </div>

    <div id="camera-container">
        <div id="reader"></div>
        <div class="scan-laser"></div>
    </div>

    <!-- ZONE SCAN -->
    <div class="box">
        <div><strong>Dernier code détecté :</strong></div>
        <h3 id="scanned-code" style="margin: 10px 0; color: #1e293b;">En attente de lecture...</h3>
        <div id="sync-status" class="status-badge status-waiting">Initialisation...</div>
    </div>

    <!-- ZONE CAPTURE PHOTO -->
    <div class="box">
        <div><strong>Associer une Photo au scan :</strong></div>
        <input type="file" id="photo-input" accept="image/*" capture="environment" style="display: none;" onchange="handlePhoto(this)">
        <button class="photo-btn" onclick="document.getElementById('photo-input').click()">📷 Prendre une Photo</button>
        <br>
        <img id="photo-preview" src="" alt="Aperçu">
        <div id="photo-status" class="status-badge status-waiting" style="display:none;">Prêt</div>
    </div>

    <script>
        const BASE_ID = "app6vRq0Yd8eYcbam";     
        const TABLE_NAME = "Entree_Sortie";           

        const codeEl = document.getElementById('scanned-code');
        const statusEl = document.getElementById('sync-status');
        const photoStatusEl = document.getElementById('photo-status');
        const patInputEl = document.getElementById('pat-input');
        const imgbbInputEl = document.getElementById('imgbb-input');
        
        let isSaved = false;
        let html5QrcodeScanner = null;
        let lastCreatedRecordId = null; 

        // Restauration des clés sauvegardées au chargement
        if (localStorage.getItem('airtable_pat')) {
            patInputEl.value = localStorage.getItem('airtable_pat');
        }
        if (localStorage.getItem('imgbb_key')) {
            imgbbInputEl.value = localStorage.getItem('imgbb_key');
        }

        function saveTokens() {
            const patValue = patInputEl.value.trim();
            const imgbbValue = imgbbInputEl.value.trim();
            
            if (patValue) localStorage.setItem('airtable_pat', patValue);
            if (imgbbValue) localStorage.setItem('imgbb_key', imgbbValue);
            
            alert("Configuration sauvegardée localement !");
            startScanner();
        }

        function startScanner() {
            if (html5QrcodeScanner) html5QrcodeScanner.clear();
            html5QrcodeScanner = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: (w, h) => ({ width: w * 0.8, height: h * 0.4 }) };

            html5QrcodeScanner.start({ facingMode: "environment" }, config,
                (text) => { if (!isSaved) processCode(text); }, () => {}
            ).then(() => {
                statusEl.className = "status-badge status-waiting";
                statusEl.innerText = "Prêt à scanner !";
            }).catch(() => {
                html5QrcodeScanner.start(undefined, config, (text) => { if (!isSaved) processCode(text); }, () => {})
                .then(() => { statusEl.innerText = "Webcam PC active !"; });
            });
        }

        async function processCode(codeValue) {
            isSaved = true;
            codeEl.innerText = codeValue;
            try { if (navigator.vibrate) navigator.vibrate(100); } catch(e) {}
            await sendToAirtable(codeValue);
            setTimeout(() => { isSaved = false; }, 4000);
        }

        async function sendToAirtable(scannedValue) {
            const currentToken = patInputEl.value.trim();
            if (!currentToken) return alert("Pas de jeton Airtable !");

            statusEl.className = "status-badge status-waiting";
            statusEl.innerText = "⏳ Envoi vers Airtable...";

            try {
                const response = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${currentToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fields: { "Scan temporaire": scannedValue },
                        typecast: true 
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    lastCreatedRecordId = data.id; 
                    statusEl.className = "status-badge status-success";
                    statusEl.innerText = "✅ Synchronisé ! Prenez la photo.";
                }
            } catch (error) {
                statusEl.className = "status-badge status-error";
                statusEl.innerText = "❌ " + error.message; 
            }
        }
async function handlePhoto(input) {
            const file = input.files[0];
            if (!file) return;

            if (!lastCreatedRecordId) {
                alert("⚠️ Scannez d'abord un appareil avant de prendre la photo !");
                return;
            }

            const imgbbKey = imgbbInputEl.value.trim();
            if (!imgbbKey) {
                alert("⚠️ Veuillez renseigner votre clé ImgBB en haut de la page !");
                return;
            }

            const preview = document.getElementById('photo-preview');
            preview.src = URL.createObjectURL(file);
            preview.style.display = "inline-block";

            photoStatusEl.style.display = "inline-block";
            photoStatusEl.className = "status-badge status-waiting";
            photoStatusEl.innerText = "⏳ Envoi de la photo...";

            try {
                // 1. Envoi de la nouvelle image vers ImgBB avec expiration (10 min)
                let formData = new FormData();
                formData.append("image", file);

                const imgbbResponse = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}&expiration=600`, {
                    method: "POST",
                    body: formData
                });

                const imgbbData = await imgbbResponse.json();
                if (!imgbbData.success) throw new Error("Échec de l'hébergement de l'image");

                const publicImageUrl = imgbbData.data.url;
                const currentToken = patInputEl.value.trim();

                // 2. Récupérer d'abord l'enregistrement actuel pour avoir les photos existantes
                const getRecordResponse = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}/${lastCreatedRecordId}`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                
                if (!getRecordResponse.ok) throw new Error("Impossible de lire les photos existantes");
                const currentRecord = await getRecordResponse.json();
                
                // On récupère le tableau existant ou on en crée un vide s'il n'y a pas encore de photo
                let existingPhotos = currentRecord.fields["Photos"] || [];

                // 3. Préparer le nouvel objet photo à ajouter
                const newPhotoObj = { 
                    "url": publicImageUrl,
                    "filename": `photo_${existingPhotos.length + 1}.jpg` 
                };

                // On fusionne l'ancienne liste avec la nouvelle photo
                const updatedPhotos = [...existingPhotos, newPhotoObj];

                // 4. Envoi de la liste complète mise à jour à Airtable
                const airtableResponse = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}/${lastCreatedRecordId}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${currentToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fields: {
                            "Photos": updatedPhotos
                        }
                    })
                });

                if (airtableResponse.ok) {
                    photoStatusEl.className = "status-badge status-success";
                    photoStatusEl.innerText = `✅ Photo ${updatedPhotos.length} envoyée avec succès !`;
                } else {
                    throw new Error("Refus de la photo par Airtable");
                }

            } catch (error) {
                photoStatusEl.className = "status-badge status-error";
                photoStatusEl.innerText = "❌ Erreur : " + error.message;
            }
        }  

        startScanner();
    </script>
</body>
</html>
